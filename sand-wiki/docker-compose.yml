services:
  directus:
    # Pinned to the exact version the committed schema snapshot was taken with.
    image: directus/directus:11.17.4
    restart: unless-stopped
    ports:
      - "8055:8055"
    volumes:
      - ./directus/snapshots:/directus/snapshots
      - ./directus/extensions:/directus/extensions
      # Uploaded files (mirrored item sprites) must survive container recreation.
      - ./directus/uploads:/directus/uploads
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      # Direct (non-pooler) endpoint: DB_SEARCH_PATH relies on SET search_path,
      # which Neon's transaction-mode pgbouncer does not preserve across queries.
      DB_CONNECTION_STRING: ${DIRECT_DATABASE_URL}
      # System tables land in the "directus" schema; content stays in "public".
      # This keeps prisma migrate's drift detection blind to Directus.
      DB_SEARCH_PATH: directus,public
      PUBLIC_URL: http://localhost:8055
      WEBSOCKETS_ENABLED: "false"
      # Allow item icons (served by the Next.js app) to render in the Studio.
      CONTENT_SECURITY_POLICY_DIRECTIVES__IMG_SRC: "'self' data: blob: http://localhost:3000"
